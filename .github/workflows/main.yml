  build-msbuild:
    name: Build msbuild
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Build the Docker image
        run: docker build --file Dockerfile.msbuild --tag landofi/msbuild .
        #run: docker build . --file Dockerfile --tag auycro/dotnet:$(date +%s)
      - name: Smoke test the Docker image
        run: docker run --rm --entrypoint cmd landofi/msbuild /c dir C:\app\out\FontDumpTruck.exe
